<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muito Obrigado — Academia da Voz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .icone {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      color: #00d4aa;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .destaque {
      color: #fff;
      font-weight: 600;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: #00d4aa;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #00bfa0; }

    .rodape {
      margin-top: 32px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icone">🎉</div>

  <h1>Muito Obrigado!</h1>

  <p>Seu pagamento foi <span class="destaque">confirmado com sucesso</span>.</p>

  <p>Fale agora com o <span class="destaque">Professor Kadu Vieira</span> e receba sua avaliação</p>

  <a href="https://wa.me/5511943190310?text=Professor...%20acabei%20de%20adquirir%20a%20avalia%C3%A7%C3%A3o" class="btn" target="_blank">
    💬 Falar no WhatsApp
  </a>

  <div class="rodape">
    Ao clicar, você será redirecionado para o WhatsApp.
  </div>
</div>

</body>
</html>
