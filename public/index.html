<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro — Avaliação Vocal - Professor Kadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4aa;
            --primary-hover: #00b38f;
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --text: #ffffff;
            --text-dim: #a0a0b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .checkout-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #161625 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h1 { font-size: 24px; letter-spacing: -0.5px; }
        .header p { color: var(--text-dim); font-size: 14px; margin-top: 5px; }

        .price-section {
            padding: 20px;
            text-align: center;
            background: rgba(0, 212, 170, 0.05);
        }

        .price-badge {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .price-section span { font-size: 14px; color: var(--text-dim); }

        .form-body { padding: 30px; }

        .input-group { margin-bottom: 15px; }
        
        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #0a0a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.2);
        }

        .btn-pay {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-pay:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-pay:active { transform: translateY(0); }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #status-msg {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            min-height: 24px;
        }

        .security-footer {
            padding: 20px;
            text-align: center;
            font-size: 11px;
            color: #555;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Estilo do QR Code */
        .pix-container {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            margin-top: 10px;
        }
        .pix-code {
            background: #f4f4f4;
            color: #333;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            margin-top: 10px;
            border-radius: 5px;
        }

        /* Aviso de Suporte */
        .support-card {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid #ffcc00;
            padding: 20px;
            border-radius: 12px;
            color: #ffcc00;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="header">
        <h1>Academia da Voz</h1>
        <p>Acelere sua evolução vocal hoje</p>
    </div>

    <div class="price-section">
        <div class="price-badge">R$ 35,00</div>
        <span>Pagamento único via PIX</span>
    </div>

    <div class="form-body">
        <div id="dynamic-content">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Carlos Eduardo">
            </div>
            <div class="input-group">
                <label>E-mail de Acesso</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>Seu CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="11">
            </div>
            <button class="btn-pay" id="main-btn" onclick="iniciarFluxo()">GERAR PIX AGORA</button>
        </div>
        <div id="status-msg"></div>
    </div>

    <div class="security-footer">
        🔒 Ambiente Criptografado e Seguro • Pagamentos via Asaas
    </div>
</div>

<script>
    // Configuração de Redirecionamento Local
    const PAGINA_OBRIGADO = "/obrigado.html";

    async function iniciarFluxo() {
        const status = document.getElementById('status-msg');
        const content = document.getElementById('dynamic-content');
        const btn = document.getElementById('main-btn');
        const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
        const email = document.getElementById('email').value.trim();
        const nome = document.getElementById('nome').value.trim();

        if (cpf.length < 11 || !email) {
            status.innerHTML = "<span style='color:#ff6b6b'>Preencha os dados corretamente!</span>";
            return;
        }

        btn.disabled = true;
        status.innerHTML = "Verificando histórico...";

        try {
            // 1. VERIFICA SE JÁ PAGOU
            const check = await callApi({ action: 'check_global', payload: { cpfCnpj: cpf } });
            if (JSON.stringify(check).includes('RECEIVED')) {
                content.innerHTML = `
                    <div class="support-card">
                        <strong style="font-size:16px">Pagamento Identificado!</strong><br><br>
                        Você já possui acesso ao curso.<br><br>
                        Precisa de ajuda?<br>
                        <strong>11 94319-0310</strong>
                    </div>`;
                status.innerHTML = "";
                return;
            }

            // 2. CRIA CLIENTE E COBRANÇA
            status.innerHTML = "Preparando seu acesso...";
            const cli = await callApi({ action: 'create_customer', payload: { name: nome || email, email, cpfCnpj: cpf } });
            const pag = await callApi({ action: 'create_payment', payload: { 
                customer: cli.id, 
                billingType: 'PIX', 
                value: 35.00, 
                dueDate: new Date().toISOString().split('T')[0], 
                externalReference: email 
            } });
            const qr = await callApi({ action: 'pix_qrcode', payload: { paymentId: pag.id } });

            // 3. EXIBE QR CODE
            content.innerHTML = `
                <div style="text-align:center">
                    <p style="margin-bottom:15px; font-weight:600">Escaneie o código abaixo:</p>
                    <div class="pix-container">
                        <img src="data:image/png;base64,${qr.encodedImage}" style="width:100%; max-width:220px;">
                        <div class="pix-code" id="pix-payload">${qr.payload}</div>
                    </div>
                    <button class="btn-pay" style="margin-top:15px; font-size:13px" onclick="copiarPix()">COPIAR CÓDIGO PIX</button>
                </div>`;
            status.innerHTML = "<span style='color:var(--primary)'>Aguardando confirmação do banco...</span>";

            // 4. VIGIA O STATUS
            setInterval(async () => {
                const s = await callApi({ action: 'check_status', payload: { paymentId: pag.id } });
                if (s.status === 'RECEIVED' || s.status === 'CONFIRMED') {
                    window.location.href = PAGINA_OBRIGADO;
                }
            }, 5000);

        } catch (e) {
            status.innerHTML = "<span style='color:#ff6b6b'>ERRO: " + e.message + "</span>";
            btn.disabled = false;
        }
    }

        const r = await fetch('/api/checkout', {
