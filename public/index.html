<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Academia da Voz — Checkout</title>
  <style>
    body { font-family: sans-serif; background: #0f0f1a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1a2e; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; }
    button { width: 100%; padding: 12px; background: #00d4aa; border: none; font-weight: bold; cursor: pointer; }
    #status { margin-top: 15px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h2>Academia da Voz</h2>
  <p>Valor: R$ 35,00</p>
  <div id="form">
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="email" id="email" placeholder="E-mail">
    <input type="text" id="cpf" placeholder="CPF" maxlength="14">
    <button id="btn" onclick="processar()">Finalizar Compra</button>
  </div>
  <div id="status"></div>
</div>

<script>
  // LINK REAL DA SUA LOVABLE
  const URL_SUCESSO = "https://vocal-divine-flow.lovable.app/obrigado/";

  async function processar() {
    const status = document.getElementById('status');
    const cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, '');
    const email = document.getElementById('email').value;

    if (!cpfLimpo || !email) { status.innerHTML = "Preencha CPF e E-mail!"; return; }
    
    status.innerHTML = "Processando...";
    
    try {
      // 1. Verifica se já pagou (Para você testar sem gastar de novo)
      const busca = await call({ action: 'check_global', payload: { cpfCnpj: cpfLimpo } });
      if (JSON.stringify(busca).includes('RECEIVED')) { window.location.replace(URL_SUCESSO); return; }

      // 2. Cria ou recupera cliente
      const cli = await call({ action: 'create_customer', payload: { name: document.getElementById('nome').value, email, cpfCnpj: cpfLimpo } });
      
      // 3. Gera Cobrança
      const pag = await call({ action: 'create_payment', payload: { customer: cli.id, billingType: 'PIX', value: 35.00, dueDate: new Date().toISOString().split('T')[0], externalReference: email } });
      
      // 4. Gera QR Code
      const qr = await call({ action: 'pix_qrcode', payload: { paymentId: pag.id } });

      document.getElementById('form').innerHTML = `
        <img src="data:image/png;base64,${qr.encodedImage}" style="width:100%">
        <p style="font-size:10px; word-break:break-all;">${qr.payload}</p>
        <p>Aguardando pagamento...</p>`;
      
      setInterval(async () => {
        const check = await call({ action: 'check_status', payload: { paymentId: pag.id } });
        if (check.status === 'RECEIVED') window.location.replace(URL_SUCESSO);
      }, 5000);

    } catch (e) { status.innerHTML = "Erro: " + e.message; }
  }

  async function call(body) {
    const r = await fetch('/api/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return await r.json();
  }
</script>
</body>
</html>
