<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Academia da Voz</title>
    <style>
        /* Estilo visual focado em conversão e modo escuro */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0f0f0f; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        .checkout-container { 
            max-width: 400px; 
            width: 100%; 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            border: 1px solid #333;
        }
        h2 { text-align: center; color: #ff3b3b; margin-bottom: 5px; }
        .price-tag { 
            text-align: center; 
            color: #ff3b3b; 
            font-weight: bold; 
            font-size: 24px; 
            margin-bottom: 25px; 
        }
        .input-group { margin-bottom: 15px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 12px; 
            color: #999; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            background: #262626; 
            border: 1px solid #3d3d3d; 
            border-radius: 8px; 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input:focus { border-color: #ff3b3b; outline: none; background: #2d2d2d; }
        
        .btn-finalizar { 
            width: 100%; 
            padding: 16px; 
            background: #ff3b3b; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s; 
            margin-top: 20px; 
        }
        .btn-finalizar:hover { background: #e63535; transform: translateY(-1px); }
        .btn-finalizar:disabled { background: #444; cursor: not-allowed; }

        /* Áreas de Feedback */
        #status-area { margin-top: 20px; }
        .error-msg { 
            background: rgba(255, 59, 59, 0.15); 
            border: 1px solid #ff3b3b; 
            color: #ff7070; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 14px; 
            display: none; 
            text-align: center;
        }
        .qr-code-box { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 20px; 
            display: none; 
            color: #000; 
            text-align: center;
        }
        .qr-code-box img { width: 100%; max-width: 200px; margin: 0 auto; }
        .copy-paste-container { margin-top: 15px; }
        .copy-paste-label { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 5px; display: block; }
        .pix-code { 
            width: 100%; 
            padding: 10px; 
            font-size: 10px; 
            border: 1px dashed #bbb; 
            background: #f0f0f0; 
            word-break: break-all; 
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>Finalizar Compra</h2>
    <div class="price-tag">R$ 35,00</div>

    <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
    </div>

    <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
    </div>

    <div class="input-group">
        <label>CPF (Apenas números)</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
    </div>

    <button class="btn-finalizar" id="btn-comprar" onclick="executarCheckout()">Gerar PIX Agora</button>

    <div id="status-area">
        <div id="msg-erro" class="error-msg"></div>
        
        <div id="qr-box" class="qr-code-box">
            <h3 style="margin-top:0; font-size: 18px;">Escaneie o QR Code</h3>
            <img id="qr-img" src="" alt="QR Code PIX">
            <div class="copy-paste-container">
                <span class="copy-paste-label">Código Copia e Cola:</span>
                <div id="pix-code" class="pix-code"></div>
            </div>
            <p style="font-size:11px; color:#ff3b3b; margin-top:12px; font-weight: bold;">Aprovação instantânea no sistema!</p>
        </div>
    </div>
</div>

<script>
    async function executarCheckout() {
        const btn = document.getElementById('btn-comprar');
        const erroDiv = document.getElementById('msg-erro');
        const qrBox = document.getElementById('qr-box');
        
        // Limpeza de estado
        erroDiv.style.display = "none";
        qrBox.style.display = "none";
        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";

        // Captura e limpeza dos dados
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const cpfRaw = document.getElementById('cpf').value;
        const cpfLimpo = cpfRaw.replace(/\D/g, ''); // Remove qualquer caractere que não seja número

        // Validação básica
        if (!nome || !email || cpfLimpo.length < 11) {
            mostrarErro("Preencha todos os campos e use um CPF válido.");
            return;
        }

        try {
            // PASSO 1: Criar/Verificar Cliente
            const cliente = await chamarBackend('create_customer', {
                name: nome,
                email: email,
                cpfCnpj: cpfLimpo
            });
            if (cliente.error) throw new Error(cliente.error);

            // PASSO 2: Criar Cobrança de R$ 35,00
            const pagamento = await chamarBackend('create_payment', {
                customer: cliente.id,
                billingType: 'PIX',
                value: 35.00,
                dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0] // Vence em 24h
            });
            if (pagamento.error) throw new Error(pagamento.error);

            // PASSO 3: Gerar QR Code e Copia e Cola
            const qrcode = await chamarBackend('pix_qrcode', {
                paymentId: pagamento.id
            });
            if (qrcode.error) throw new Error(qrcode.error);

            // SUCESSO: Exibir resultados
            document.getElementById('qr-img').src = `data:image/png;base64,${qrcode.encodedImage}`;
            document.getElementById('pix-code').innerText = qrcode.payload;
            qrBox.style.display = "block";
            btn.innerText = "PIX GERADO COM SUCESSO!";
            btn.style.background = "#28a745";

        } catch (err) {
            mostrarErro(err.message);
        }
    }

    async function chamarBackend(action, payload) {
        try {
            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload })
            });
            
            const data = await response.json();
            return data;
        } catch (e) {
            return { error: "Erro de conexão com o servidor. Verifique sua internet." };
        }
    }

    function mostrarErro(texto) {
        const erroDiv = document.getElementById('msg-erro');
        const btn = document.getElementById('btn-comprar');
        erroDiv.innerText = "⚠️ " + texto;
        erroDiv.style.display = "block";
        btn.disabled = false;
        btn.innerText = "TENTAR NOVAMENTE";
    }
</script>

</body>
</html>
