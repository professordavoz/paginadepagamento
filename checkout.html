<script>
    let vigia;

    async function processarFluxo() {
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        // Limpa CPF para garantir a busca no Asaas
        const cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, '');

        if (!email || !cpfLimpo) {
            status.innerHTML = `<b style="color:yellow">Preencha E-mail e CPF!</b>`;
            return;
        }

        status.innerHTML = "Verificando seu pagamento...";
        btn.disabled = true;

        try {
            // 1. Busca no histórico do Asaas (Agora com a rota dupla que consertamos)
            const busca = await call('/api/checkout', { 
                action: 'check_global', 
                payload: { cpfCnpj: cpfLimpo } 
            });

            // 2. Trava de segurança rígida: SÓ passa se o Asaas confirmar que o dinheiro caiu
            if (busca && busca.data && Array.isArray(busca.data)) {
                const jaEstaPago = busca.data.some(p => p.status === 'RECEIVED' || p.status === 'CONFIRMED');
                
                if (jaEstaPago) {
                    redirecionarSucesso();
                    return; // Aborta a geração de um novo PIX e manda direto pro curso
                }
            }

            // 3. Se não achou pagamento PAGO, cria um novo (Por isso você viu o QR Code)
            status.innerHTML = "Identificando cadastro...";
            const cli = await call('/api/checkout', { 
                action: 'create_customer', 
                payload: { name: nome, email: email, cpfCnpj: cpfLimpo } 
            });
            
            status.innerHTML = "Gerando PIX...";
            const pag = await call('/api/checkout', { 
                action: 'create_payment', 
                payload: { customer: cli.id, billingType: 'PIX', value: 35.00, dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0] } 
            });

            const qr = await call('/api/checkout', { action: 'pix_qrcode', payload: { paymentId: pag.id } });

            document.getElementById('form-container').style.display = 'none';
            status.innerHTML = `
                <div style="background:#fff; color:#000; padding:20px; border-radius:12px; text-align:center;">
                    <img src="data:image/png;base64,${qr.encodedImage}" style="width:100%; max-width:250px;">
                    <p style="background:#eee; padding:10px; font-size:10px; word-break:break-all;">${qr.payload}</p>
                    <p style="color:blue; font-weight:bold;">Aguardando pagamento...</p>
                </div>`;

            iniciarVigia(pag.id);

        } catch (err) {
            status.innerHTML = `<b style="color:red">Erro: ${err.message}</b>`;
            btn.disabled = false;
        }
    }

    function iniciarVigia(paymentId) {
        if (vigia) clearInterval(vigia);
        vigia = setInterval(async () => {
            try {
                const res = await call('/api/checkout', { action: 'check_status', payload: { paymentId } });
                if (res.status === 'RECEIVED' || res.status === 'CONFIRMED') {
                    clearInterval(vigia);
                    redirecionarSucesso();
                }
            } catch (e) {
                console.error("Erro na vigia:", e);
            }
        }, 5000);
    }

    function redirecionarSucesso() {
        document.getElementById('status').innerHTML = `<h2 style="color:#00ff00">PAGAMENTO IDENTIFICADO!</h2><p>Redirecionando...</p>`;
        setTimeout(() => {
            window.location.href = "https://vocal-divine-flow.lovable.app/obrigado";
        }, 2000);
    }

    async function call(url, body) {
        const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        return await r.json();
    }
</script>
