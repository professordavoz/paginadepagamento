<script>
    let vigia;

    async function processarFluxo() {
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, '');

        if (!email || !cpfLimpo) {
            status.innerHTML = `<b style="color:yellow">Preencha o E-mail e o CPF!</b>`;
            return;
        }

        status.innerHTML = "A verificar o seu histórico de pagamentos...";
        btn.disabled = true;

        try {
            // Verifica o seu CPF para ver se você já pagou hoje (e você já pagou!)
            const busca = await call('/api/checkout', { 
                action: 'check_global', 
                payload: { cpfCnpj: cpfLimpo } 
            });

            const respostaBusca = JSON.stringify(busca);
            // Se encontrar o seu pagamento de 35 reais, destranca a porta na hora!
            if (respostaBusca.includes('RECEIVED') || respostaBusca.includes('CONFIRMED')) {
                redirecionarSucesso();
                return; 
            }

            status.innerHTML = "A identificar o registo...";
            const cli = await call('/api/checkout', { 
                action: 'create_customer', 
                payload: { name: nome, email: email, cpfCnpj: cpfLimpo } 
            });
            
            status.innerHTML = "A gerar o PIX...";
            const pag = await call('/api/checkout', { 
                action: 'create_payment', 
                payload: { 
                    customer: cli.id, 
                    billingType: 'PIX', 
                    value: 35.00,
                    dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0],
                    externalReference: email
                } 
            });

            const qr = await call('/api/checkout', { action: 'pix_qrcode', payload: { paymentId: pag.id } });

            document.getElementById('form-container').style.display = 'none';
            status.innerHTML = `
                <div style="background:#fff; color:#000; padding:20px; border-radius:12px; text-align:center;">
                    <img src="data:image/png;base64,${qr.encodedImage}" style="width:100%; max-width:250px;">
                    <p style="background:#eee; padding:10px; font-size:10px; word-break:break-all;">${qr.payload}</p>
                    <p style="color:blue; font-weight:bold;">A aguardar pagamento...</p>
                    <div id="radar-asaas" style="margin-top:15px; padding:10px; background:#222; color:#0f0; font-family:monospace; border-radius:5px; font-size:10px; word-wrap: break-word;">
                        A ligar o radar...
                    </div>
                </div>`;

            iniciarVigia(pag.id);

        } catch (err) {
            // Agora ele vai te mostrar O QUE a Vercel respondeu de errado
            status.innerHTML = `<b style="color:red">Erro detalhado da Vercel: ${err.message}</b>`;
            btn.disabled = false;
        }
    }

    function iniciarVigia(paymentId) {
        if (vigia) clearInterval(vigia);
        vigia = setInterval(async () => {
            try {
                const res = await call('/api/checkout', { action: 'check_status', payload: { paymentId } });
                const radar = document.getElementById('radar-asaas');
                
                const respostaCrua = JSON.stringify(res);
                if(radar) radar.innerHTML = `LENDO VERCEL: ${respostaCrua}`;

                if (respostaCrua.includes('RECEIVED') || respostaCrua.includes('CONFIRMED')) {
                    clearInterval(vigia);
                    redirecionarSucesso();
                }
            } catch (e) {
                console.error("Erro na vigia:", e);
            }
        }, 5000); 
    }

    function redirecionarSucesso() {
        document.getElementById('status').innerHTML = `<h2 style="color:#00ff00">PAGAMENTO IDENTIFICADO!</h2><p>A redirecionar para a Academia da Voz...</p>`;
        setTimeout(() => {
            window.location.replace("https://vocal-divine-flow.lovable.app/obrigado/");
        }, 2000);
    }

    // A FUNÇÃO BLINDADA: Nunca mais vai dar "Unexpected end of JSON input"
    async function call(url, body) {
        const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const texto = await r.text(); // Lê como texto primeiro
        
        if (!texto) throw new Error("A Vercel não respondeu nada (Resposta em branco).");
        
        try {
            const dados = JSON.parse(texto);
            if (dados.error) throw new Error(dados.error);
            return dados;
        } catch(e) {
            // Se não for JSON, joga na tela exatamente o que a Vercel cuspiu
            if(e.message.includes('Vercel') || e.message === texto) throw e;
            throw new Error(`A Vercel quebrou e respondeu: ${texto}`);
        }
    }
</script>
