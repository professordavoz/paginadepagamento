<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checkout PIX - Academia da Voz</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 40px; }
        .card { background: #111; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff3b3b; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; text-align: center; }
        .qr-box { background: #fff; color: #000; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .qr-box img { width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#ff3b3b; text-align:center">Finalizar Compra</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="cpf" placeholder="CPF (apenas números)">
        <button id="btn" onclick="pagar()">GERAR PIX - R$ 35,00</button>
        <div id="status"></div>
    </div>

    <script>
        async function pagar() {
            const status = document.getElementById('status');
            status.innerHTML = "Processando...";
            const payload = {
                name: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpfCnpj: document.getElementById('cpf').value.replace(/\D/g, '')
            };
            try {
                const cli = await call('/api/checkout', { action: 'create_customer', payload });
                const pag = await call('/api/checkout', {
                    action: 'create_payment',
                    payload: { customer: cli.id, billingType: 'PIX', value: 35.00, dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0] }
                });
                const qr = await call('/api/checkout', { action: 'pix_qrcode', payload: { paymentId: pag.id } });
                status.innerHTML = `<div class="qr-box"><h3>Pague com PIX</h3><img src="data:image/png;base64,${qr.encodedImage}"><p style="font-size:10px;word-break:break-all;margin-top:10px;">${qr.payload}</p></div>`;
            } catch (err) {
                status.innerHTML = `<div style="color:#ff7070">⚠️ ${err.message}</div>`;
            }
        }
        async function call(url, body) {
            const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || "Erro");
            return d;
        }
    </script>
</body>
</html>
