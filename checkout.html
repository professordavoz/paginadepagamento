<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 20px; margin:0; }
        .card { background: #111; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff3b3b; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; }
        .qr-box { background: #fff; color: #000; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .qr-box img { width: 100%; max-width: 250px; display: block; margin: 0 auto; }
        .pix-copia { background: #eee; padding: 10px; font-size: 11px; word-break: break-all; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: monospace; }
        .erro-alerta { color: #ff3b3b; padding: 10px; border: 1px solid #ff3b3b; border-radius: 8px; background: rgba(255,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#ff3b3b">Finalizar Compra</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="cpf" placeholder="CPF (apenas números)">
        <button id="btn" onclick="gerarPix()">GERAR PIX - R$ 35,00</button>
        <div id="status"></div>
    </div>

    <script>
        async function gerarPix() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            status.innerHTML = "Gerando pagamento...";
            btn.disabled = true;

            const dados = {
                name: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpfCnpj: document.getElementById('cpf').value.replace(/\D/g, '')
            };

            try {
                const cli = await callAPI('create_customer', dados);
                const pag = await callAPI('create_payment', {
                    customer: cli.id,
                    billingType: 'PIX',
                    value: 35.00,
                    dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0]
                });
                const qr = await callAPI('pix_qrcode', { paymentId: pag.id });

                if (!qr.encodedImage) throw new Error("Imagem do QR Code não gerada pelo Asaas.");

                status.innerHTML = `
                    <div class="qr-box">
                        <h3 style="margin-top:0">Escaneie o QR Code</h3>
                        <img src="data:image/png;base64,${qr.encodedImage}">
                        <p style="font-weight:bold; margin-top:10px;">Copia e Cola:</p>
                        <div class="pix-copia">${qr.payload}</div>
                    </div>`;
            } catch (err) {
                status.innerHTML = `<div class="erro-alerta">⚠️ ${err.message}</div>`;
                btn.disabled = false;
            }
        }

        async function callAPI(action, payload) {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Erro na API");
            return data;
        }
    </script>
</body>
</html>
