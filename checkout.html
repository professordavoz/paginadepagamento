<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Academia da Voz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #ff3b3b; margin-top: 0; }
        .total { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #ff3b3b; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #ff3b3b; outline: none; }
        button { width: 100%; padding: 15px; background: #ff3b3b; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d32f2f; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; }
        .erro-msg { color: #ff7070; background: rgba(255,0,0,0.1); padding: 12px; border: 1px solid #ff3b3b; border-radius: 8px; font-size: 14px; }
        .qr-box { background: #fff; color: #000; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .qr-box img { width: 100%; max-width: 200px; margin-bottom: 10px; }
        .pix-code { background: #eee; padding: 10px; font-size: 10px; word-break: break-all; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2>Finalizar Compra</h2>
    <div class="total">R$ 35,00</div>

    <label>Nome Completo</label>
    <input type="text" id="nome" placeholder="Ex: Carlos Silva">

    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com">

    <label>CPF (apenas números)</label>
    <input type="text" id="cpf" placeholder="00000000000" maxlength="11">

    <button id="btn-finalizar" onclick="gerarPagamento()">GERAR PIX AGORA</button>

    <div id="status"></div>
</div>

<script>
    async function gerarPagamento() {
        const status = document.getElementById('status');
        const btn = document.getElementById('btn-finalizar');
        
        // Captura e limpeza básica
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const cpf = document.getElementById('cpf').value.replace(/\D/g, '');

        if (!nome || !email || cpf.length < 11) {
            status.innerHTML = `<div class="erro-msg">⚠️ Preencha todos os campos corretamente (Nome, Email e CPF).</div>`;
            return;
        }

        status.innerHTML = "Processando seu pagamento...";
        btn.disabled = true;

        try {
            // 1. Criar Cliente
            const cli = await fetchPost('/api/checkout', { 
                action: 'create_customer', 
                payload: { name: nome, email: email, cpfCnpj: cpf } 
            });
            if (cli.error) throw new Error(cli.error);

            // 2. Criar Pagamento
            const pag = await fetchPost('/api/checkout', {
                action: 'create_payment',
                payload: {
                    customer: cli.id,
                    billingType: 'PIX',
                    value: 35.00,
                    dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0]
                }
            });
            if (pag.error) throw new Error(pag.error);

            // 3. Obter QR Code
            const qr = await fetchPost('/api/checkout', { 
                action: 'pix_qrcode', 
                payload: { paymentId: pag.id } 
            });
            if (qr.error) throw new Error(qr.error);

            // SUCESSO
            status.innerHTML = `
                <div class="qr-box">
                    <h3 style="margin-top:0">Pagamento Gerado!</h3>
                    <img src="data:image/png;base64,${qr.encodedImage}">
                    <p style="font-size:12px; font-weight:bold; margin: 5px 0;">Copia e Cola:</p>
                    <div class="pix-code">${qr.payload}</div>
                    <p style="font-size:11px; margin-top:10px; color:#666;">O acesso será liberado após o pagamento.</p>
                </div>`;
            btn.innerText = "PIX GERADO";

        } catch (err) {
            status.innerHTML = `<div class="erro-msg">⚠️ ${err.message}</div>`;
            btn.disabled = false;
        }
    }

    async function fetchPost(url, body) {
        const r = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return await r.json();
    }
</script>

</body>
</html>
