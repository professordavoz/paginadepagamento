<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX - Academia da Voz</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff3b3b; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; }
        .error { color: #ff7070; background: rgba(255,0,0,0.1); padding: 10px; border: 1px solid #ff3b3b; border-radius: 5px; }
        .qr-box { background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .qr-box img { width: 100%; max-width: 200px; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#ff3b3b">Finalizar Compra</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="cpf" placeholder="CPF (apenas números)">
        <button id="btn" onclick="gerarPagamento()">GERAR PIX - R$ 35,00</button>
        <div id="status"></div>
    </div>

    <script>
        async function gerarPagamento() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            status.innerHTML = "Processando pagamento...";
            btn.disabled = true;

            const dados = {
                name: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpfCnpj: document.getElementById('cpf').value.replace(/\D/g, '')
            };

            try {
                // 1. Criar Cliente
                const cli = await fetchAPI('create_customer', dados);
                
                // 2. Criar Cobrança
                const pag = await fetchAPI('create_payment', {
                    customer: cli.id,
                    billingType: 'PIX',
                    value: 35.00,
                    dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0]
                });

                // 3. Gerar QR Code
                const qr = await fetchAPI('pix_qrcode', { paymentId: pag.id });

                status.innerHTML = `
                    <div class="qr-box">
                        <h3 style="margin-top:0">Escaneie o QR Code</h3>
                        <img src="data:image/png;base64,${qr.encodedImage}">
                        <p style="font-size:10px; word-break:break-all; margin-top:10px;">${qr.payload}</p>
                    </div>`;
            } catch (err) {
                status.innerHTML = `<div class="error">⚠️ ${err.message}</div>`;
                btn.disabled = false;
            }
        }

        async function fetchAPI(action, payload) {
            const r = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload })
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.error || "Erro na API");
            return data;
        }
    </script>
</body>
</html>
