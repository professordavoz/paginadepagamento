<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pagamento PIX</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff3b3b; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; }
        .qr-box { background: #fff; color: #000; padding: 20px; border-radius: 10px; margin-top: 20px; display: inline-block; width: 90%; }
        .qr-box img { width: 100%; height: auto; display: block; margin: 0 auto; }
        .pix-copia { background: #eee; padding: 10px; font-size: 10px; word-break: break-all; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Finalizar Compra</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="cpf" placeholder="CPF (Apenas números)">
        <button id="btn" onclick="gerar()">GERAR PIX - R$ 35,00</button>
        <div id="status"></div>
    </div>
    <script>
        async function gerar() {
            const status = document.getElementById('status');
            status.innerHTML = "Gerando PIX...";
            const payload = {
                name: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpfCnpj: document.getElementById('cpf').value.replace(/\D/g, '')
            };
            try {
                const cli = await call('/api/checkout', { action: 'create_customer', payload });
                if (cli.errors) throw new Error(cli.errors[0].description);

                const pag = await call('/api/checkout', { action: 'create_payment', payload: { customer: cli.id, billingType: 'PIX', value: 35.00, dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0] } });
                if (pag.errors) throw new Error(pag.errors[0].description);

                const qr = await call('/api/checkout', { action: 'pix_qrcode', payload: { paymentId: pag.id } });
                
                // AJUSTE AQUI: Verifica se a imagem existe
                if (!qr.encodedImage) throw new Error("Erro ao gerar imagem do QR Code");

                status.innerHTML = `
                    <div class="qr-box">
                        <h3 style="margin-top:0">Escaneie o QR Code</h3>
                        <img src="data:image/png;base64,${qr.encodedImage}">
                        <p style="font-weight:bold; margin-top:10px;">Copia e Cola:</p>
                        <div class="pix-copia">${qr.payload}</div>
                    </div>`;
            } catch (err) {
                status.innerHTML = `<div style="color:#ff3b3b; padding:10px; border:1px solid #ff3b3b; border-radius:8px;">⚠️ ${err.message}</div>`;
            }
        }
        async function call(url, body) {
            const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            return await r.json();
        }
    </script>
</body>
</html>
