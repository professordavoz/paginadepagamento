<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checkout PIX</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #1557b0; }
        #status { margin-top: 20px; text-align: center; color: #444; }
        img { width: 100%; border: 1px solid #eee; margin-top: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Finalizar Pagamento</h3>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="cpf" placeholder="CPF ou CNPJ">
        <input type="email" id="email" placeholder="E-mail">
        <button onclick="gerarPagamento()">GERAR PIX (R$ 50,00)</button>
        <div id="status"></div>
    </div>

    <script>
        async function gerarPagamento() {
            const status = document.getElementById('status');
            status.innerHTML = "Aguarde, processando...";

            const dadosCliente = {
                name: document.getElementById('nome').value,
                cpfCnpj: document.getElementById('cpf').value,
                email: document.getElementById('email').value
            };

            try {
                // 1. Criar Cliente
                status.innerHTML = "Passo 1/3: Cadastrando cliente...";
                const cliente = await chamarAPI('create_customer', dadosCliente);
                if (cliente.error) throw new Error(cliente.error);

                // 2. Criar Pagamento
                status.innerHTML = "Passo 2/3: Gerando cobrança...";
                const pagamento = await chamarAPI('create_payment', {
                    customer: cliente.id,
                    billingType: 'PIX',
                    value: 50.00,
                    dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0]
                });
                if (pagamento.error) throw new Error(pagamento.error);

                // 3. Gerar QR Code
                status.innerHTML = "Passo 3/3: Gerando QR Code...";
                const qrcode = await chamarAPI('pix_qrcode', { paymentId: pagamento.id });
                if (qrcode.error) throw new Error(qrcode.error);

                status.innerHTML = `<h4>Sucesso! Escaneie abaixo:</h4>
                    <img src="data:image/png;base64,${qrcode.encodedImage}">
                    <p style="font-size:12px; word-break:break-all; background:#eee; padding:10px; margin-top:10px;">${qrcode.payload}</p>`;

            } catch (err) {
                status.innerHTML = `<b style="color:red">Erro: ${err.message}</b>`;
            }
        }

        async function chamarAPI(action, payload) {
            const r = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload })
            });
            const text = await r.text();
            return text ? JSON.parse(text) : { error: "Sem resposta do servidor" };
        }
    </script>
</body>
</html>
