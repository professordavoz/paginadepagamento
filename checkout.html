<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Professor da Voz</title>
    <style>
        /* Mantendo o seu estilo visual */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .checkout-container { max-width: 450px; width: 100%; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2, h3 { text-align: center; color: #ff3b3b; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #ff3b3b; outline: none; }
        .btn-finalizar { width: 100%; padding: 15px; background: #ff3b3b; color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .btn-finalizar:hover { background: #d32f2f; }
        .btn-finalizar:disabled { background: #555; cursor: not-allowed; }
        #status-area { margin-top: 20px; text-align: center; }
        .error-msg { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff3b3b; color: #ff3b3b; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
        .qr-code-box { background: #fff; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; color: #000; }
        .qr-code-box img { width: 100%; max-width: 250px; display: block; margin: 0 auto; }
        .copy-paste { width: 100%; margin-top: 10px; padding: 10px; font-size: 10px; border: 1px dashed #ccc; background: #f9f9f9; word-break: break-all; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>Finalizar Compra</h2>
    <p style="text-align:center; color: #ff3b3b; font-weight: bold; font-size: 20px;">Total: R$ 35,00</p>

    <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome aqui" required>
    </div>

    <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="email@exemplo.com" required>
    </div>

    <div class="input-group">
        <label>CPF (Apenas números)</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
    </div>

    <button class="btn-finalizar" id="btn-comprar" onclick="executarCheckout()">Finalizar Compra - R$ 35,00</button>

    <div id="status-area">
        <div id="msg-erro" class="error-msg"></div>
        
        <div id="qr-box" class="qr-code-box">
            <h3 style="color:#000; margin-top:0;">Pague com PIX</h3>
            <img id="qr-img" src="" alt="QR Code">
            <p style="font-size:12px; margin-bottom:5px;">Copia e Cola:</p>
            <div id="pix-code" class="copy-paste"></div>
            <p style="font-size:11px; color:#666; margin-top:10px;">Aprovação instantânea.</p>
        </div>
    </div>
</div>

<script>
    async function executarCheckout() {
        const btn = document.getElementById('btn-comprar');
        const erroDiv = document.getElementById('msg-erro');
        const qrBox = document.getElementById('qr-box');
        
        // Reset inicial
        erroDiv.style.display = "none";
        qrBox.style.display = "none";
        btn.disabled = true;
        btn.innerText = "Processando...";

        // Captura e limpeza de dados
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, ''); // Remove tudo que não é número

        if (cpfLimpo.length < 11) {
            mostrarErro("Por favor, insira um CPF válido.");
            return;
        }

        try {
            // 1. Criar Cliente no Asaas
            const cliente = await chamarBackend('create_customer', {
                name: nome,
                email: email,
                cpfCnpj: cpfLimpo
            });
            if (cliente.error) throw new Error(cliente.error);

            // 2. Criar Cobrança (Pagamento)
            const pagamento = await chamarBackend('create_payment', {
                customer: cliente.id,
                billingType: 'PIX',
                value: 35.00,
                dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0] // Vence em 24h
            });
            if (pagamento.error) throw new Error(pagamento.error);

            // 3. Gerar QR Code PIX
            const qrcode = await chamarBackend('pix_qrcode', {
                paymentId: pagamento.id
            });
            if (qrcode.error) throw new Error(qrcode.error);

            // Sucesso: Mostrar QR Code
            document.getElementById('qr-img').src = `data:image/png;base64,${qrcode.encodedImage}`;
            document.getElementById('pix-code').innerText = qrcode.payload;
            qrBox.style.display = "block";
            btn.innerText = "Pagamento Gerado!";

        } catch (err) {
            mostrarErro(err.message);
        }
    }

    async function chamarBackend(action, payload) {
        const response = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, payload })
        });
        
        const data = await response.json();
        return data;
    }

    function mostrarErro(texto) {
        const erroDiv = document.getElementById('msg-erro');
        const btn = document.getElementById('btn-comprar');
        erroDiv.innerText = "⚠️ " + texto;
        erroDiv.style.display = "block";
        btn.disabled = false;
        btn.innerText = "Finalizar Compra - R$ 35,00";
    }
</script>

</body>
</html>
